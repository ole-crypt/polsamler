<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Polsamler</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<style>
:root{--bg:#060610;--bg2:#0a0a1a;--bg3:#0f0f22;--border:#1a1a3a;--se-blue:#006AA7;--se-yellow:#FECC02;--no-red:#ef2b2d;--green:#00ff88;--red:#ff3355;--text:#e8e8ff;--dim:#5050aa;--muted:#8888cc;--mono:'Courier New',monospace;--radius:12px;--font:'Segoe UI',system-ui,sans-serif;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;}
.ticker-wrap{background:#000;border-bottom:2px solid var(--se-yellow);overflow:hidden;padding:5px 0;}
.ticker{display:flex;gap:44px;animation:ticker 32s linear infinite;white-space:nowrap;width:max-content;}
@keyframes ticker{from{transform:translateX(0)}to{transform:translateX(-50%)}}
.tick-item{font-family:var(--mono);font-size:0.72rem;display:flex;gap:7px;align-items:center;}
.tick-name{color:var(--se-yellow);font-weight:700;}.tick-price{color:var(--text);}.tick-up{color:var(--green);}.tick-dn{color:var(--red);}
header{background:linear-gradient(135deg,#006AA7 0%,#003d63 100%);border-bottom:4px solid var(--se-yellow);padding:18px 28px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;position:relative;overflow:hidden;}
header::before{content:'';position:absolute;inset:0;background:repeating-linear-gradient(90deg,transparent 0px,transparent 80px,rgba(254,204,2,0.04) 80px,rgba(254,204,2,0.04) 84px);pointer-events:none;}
.logo{position:relative;z-index:1;}.logo h1{font-size:1.9rem;font-weight:900;color:var(--se-yellow);text-shadow:0 0 30px #FECC0288;cursor:pointer;letter-spacing:-0.02em;}
.logo span{font-size:0.8rem;color:rgba(255,255,255,0.55);margin-top:2px;display:block;}
.header-right{display:flex;align-items:center;gap:12px;position:relative;z-index:1;}
.flag-badge{padding:6px 14px;border-radius:99px;font-size:0.8rem;font-weight:700;}
.badge-se{background:var(--se-yellow);color:var(--se-blue);}.badge-no{background:var(--no-red);color:#fff;}
.live-dot{background:var(--green);color:#000;font-size:0.68rem;font-weight:800;padding:3px 8px;border-radius:99px;animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
.clock{font-family:var(--mono);font-size:0.75rem;color:rgba(255,255,255,0.45);}
#viewSearch{display:block;}#viewProduct{display:none;}
.main{max-width:1100px;margin:0 auto;padding:26px 18px;}
.search-wrap{background:var(--bg2);border:1px solid var(--se-blue);box-shadow:0 0 40px #006AA722;border-radius:var(--radius);padding:22px;margin-bottom:22px;}
.search-row{display:flex;gap:10px;flex-wrap:wrap;}
.search-input-wrap{flex:1;min-width:220px;position:relative;}
.search-input-wrap input{width:100%;background:var(--bg3);border:1px solid var(--se-blue);color:var(--text);padding:13px 16px 13px 44px;border-radius:8px;font-size:1rem;transition:all 0.2s;}
.search-input-wrap input:focus{outline:none;border-color:var(--se-yellow);box-shadow:0 0 20px #FECC0233;}
.search-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--se-yellow);pointer-events:none;}
.btn{border:none;border-radius:8px;font-weight:700;cursor:pointer;transition:all 0.2s;padding:13px 24px;font-size:0.92rem;}
.btn:hover{transform:translateY(-1px);}.btn:disabled{opacity:0.4;cursor:not-allowed;transform:none;}
.btn-yellow{background:var(--se-yellow);color:var(--se-blue);text-transform:uppercase;box-shadow:0 0 20px #FECC0255;}
.btn-yellow:hover{box-shadow:0 0 40px #FECC0288;}
.filter-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:16px;}
.filter-btn{background:var(--bg3);border:1px solid var(--se-blue);color:var(--muted);padding:7px 16px;border-radius:99px;font-size:0.8rem;cursor:pointer;transition:all 0.15s;font-weight:500;}
.filter-btn:hover{border-color:var(--se-yellow);color:var(--se-yellow);}
.filter-btn.active{background:var(--se-yellow);border-color:var(--se-yellow);color:var(--se-blue);font-weight:700;box-shadow:0 0 14px #FECC0255;}
.sort-bar{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;margin-bottom:14px;}
.result-count{font-size:0.83rem;color:var(--muted);}.result-count strong{color:var(--se-yellow);}
.sort-options{display:flex;gap:6px;flex-wrap:wrap;align-items:center;}
.sort-lbl{font-size:0.73rem;color:var(--dim);}
.sort-btn{background:var(--bg2);border:1px solid var(--border);color:var(--muted);padding:5px 12px;border-radius:6px;font-size:0.77rem;cursor:pointer;transition:all 0.15s;}
.sort-btn:hover{border-color:var(--se-yellow);color:var(--se-yellow);}
.sort-btn.active{background:var(--se-blue);border-color:var(--se-yellow);color:var(--se-yellow);font-weight:700;}
.table-wrap{overflow-x:auto;border-radius:var(--radius);border:1px solid var(--se-blue);box-shadow:0 0 40px #006AA718;}
table{width:100%;border-collapse:collapse;font-size:0.87rem;}
thead th{background:linear-gradient(180deg,#006AA7 0%,#004d7a 100%);border-bottom:2px solid var(--se-yellow);padding:12px 16px;text-align:left;font-size:0.7rem;text-transform:uppercase;letter-spacing:0.08em;color:rgba(255,255,255,0.75);white-space:nowrap;cursor:pointer;user-select:none;}
thead th:hover{color:var(--se-yellow);}thead th.sorted{color:var(--se-yellow);}
tbody tr{border-bottom:1px solid var(--border);transition:background 0.12s;cursor:pointer;}
tbody tr:hover{background:rgba(0,106,167,0.15);}
tbody td{padding:13px 16px;vertical-align:middle;}
.product-name{font-weight:700;color:var(--text);margin-bottom:3px;}.product-meta{font-size:0.72rem;color:var(--dim);}
.source-badge{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:99px;font-size:0.7rem;font-weight:700;}
.badge-tbl-no{background:#2d0a0a;color:var(--no-red);border:1px solid var(--no-red);}
.badge-tbl-se{background:#001a2d;color:var(--se-yellow);border:1px solid var(--se-blue);}
.price-no{font-weight:800;font-size:1.05rem;color:var(--no-red);font-family:var(--mono);}
.price-se{font-weight:800;font-size:1.05rem;color:var(--se-yellow);font-family:var(--mono);text-shadow:0 0 10px #FECC0233;}
.diff-se{background:#001a2d;color:var(--se-yellow);border:1px solid var(--se-yellow);padding:3px 10px;border-radius:99px;font-size:0.78rem;font-weight:800;}
.diff-no{background:#2d0a0a;color:var(--no-red);border:1px solid var(--no-red);padding:3px 10px;border-radius:99px;font-size:0.78rem;font-weight:800;}
.diff-na{color:var(--dim);font-size:0.78rem;}
.val-cell{font-size:0.77rem;color:var(--muted);font-family:var(--mono);}
.open-btn{background:var(--bg3);border:1px solid var(--se-blue);color:var(--se-yellow);padding:5px 12px;border-radius:6px;font-size:0.75rem;font-weight:700;cursor:pointer;transition:all 0.15s;}
.open-btn:hover{background:var(--se-blue);}
.loading{text-align:center;padding:60px;color:var(--muted);}
.spinner{display:inline-block;width:30px;height:30px;border:3px solid var(--border);border-top-color:var(--se-yellow);border-radius:50%;animation:spin 0.7s linear infinite;margin-bottom:10px;}
@keyframes spin{to{transform:rotate(360deg)}}
.empty-state{text-align:center;padding:70px 20px;color:var(--dim);}.empty-state .big{font-size:4rem;margin-bottom:12px;}
.prod-main{max-width:1200px;margin:0 auto;padding:24px 18px;}
.back-btn{display:inline-flex;align-items:center;gap:8px;background:var(--bg2);border:1px solid var(--se-blue);color:var(--se-yellow);padding:8px 16px;border-radius:8px;font-size:0.82rem;font-weight:700;cursor:pointer;margin-bottom:20px;transition:all 0.15s;}
.back-btn:hover{background:var(--se-blue);}
.product-header{background:var(--bg2);border:1px solid var(--se-blue);border-radius:14px;padding:22px 26px;margin-bottom:18px;box-shadow:0 0 40px #006AA711;display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:16px;}
.product-title h2{font-size:1.6rem;font-weight:900;color:var(--text);margin-bottom:6px;}
.ticker-sym{font-family:var(--mono);font-size:0.78rem;color:var(--se-yellow);background:#001a2d;padding:3px 10px;border-radius:4px;border:1px solid var(--se-blue);margin-right:8px;}
.cat-tag{font-size:0.73rem;color:var(--muted);background:var(--bg3);padding:3px 10px;border-radius:4px;border:1px solid var(--border);}
.price-big{font-size:2.8rem;font-weight:900;font-family:var(--mono);line-height:1;}
.price-big.up{color:var(--green);text-shadow:0 0 24px #00ff8866;}.price-big.dn{color:var(--red);text-shadow:0 0 24px #ff335566;}
.chg-badge{font-size:0.95rem;font-weight:700;padding:4px 12px;border-radius:6px;display:inline-block;margin-top:6px;}
.chg-up{background:rgba(0,255,136,0.12);color:var(--green);border:1px solid var(--green);}
.chg-dn{background:rgba(255,51,85,0.12);color:var(--red);border:1px solid var(--red);}
.blink-g{animation:blG 1s ease 3;}.blink-r{animation:blR 1s ease 3;}
@keyframes blG{0%,100%{background:transparent}50%{background:rgba(0,255,136,0.15)}}
@keyframes blR{0%,100%{background:transparent}50%{background:rgba(255,51,85,0.15)}}
.kpi-row{display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:11px;margin-bottom:18px;}
.kpi-card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:13px 15px;transition:border-color 0.2s;}
.kpi-card:hover{border-color:var(--se-blue);}
.kpi-lbl{font-size:0.65rem;text-transform:uppercase;letter-spacing:0.1em;color:var(--dim);margin-bottom:5px;}
.kpi-val{font-size:1.15rem;font-weight:800;font-family:var(--mono);}
.kv-y{color:var(--se-yellow)}.kv-g{color:var(--green)}.kv-r{color:var(--red)}.kv-b{color:#60a5fa}
.kpi-sub{font-size:0.68rem;color:var(--muted);margin-top:2px;}
.chart-grid{display:grid;grid-template-columns:2fr 1fr;gap:14px;margin-bottom:16px;}
.chart-row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;margin-bottom:16px;}
.chart-card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:16px;}
.chart-card h3{font-size:0.72rem;text-transform:uppercase;letter-spacing:0.08em;color:var(--muted);margin-bottom:12px;display:flex;justify-content:space-between;align-items:center;}
.chart-card h3 em{font-style:normal;font-size:0.65rem;color:var(--dim);font-weight:400;}
.gauge-wrap{display:flex;flex-direction:column;align-items:center;padding:8px 0;}
.sentiment-bar{width:100%;height:10px;border-radius:99px;background:linear-gradient(90deg,var(--red) 0%,#ffaa00 50%,var(--green) 100%);margin:10px 0 5px;position:relative;}
.sent-needle{position:absolute;top:-5px;width:4px;height:20px;background:#fff;border-radius:2px;transform:translateX(-50%);box-shadow:0 0 8px #fff8;transition:left 1.2s ease;}
.gauge-score{font-size:1.4rem;font-weight:900;margin-top:8px;}.gauge-lbl{font-size:0.72rem;color:var(--muted);}
.compare-card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:18px;margin-bottom:16px;}
.compare-card h3{font-size:0.72rem;text-transform:uppercase;letter-spacing:0.08em;color:var(--muted);margin-bottom:14px;}
.ctable{width:100%;border-collapse:collapse;font-size:0.84rem;}
.ctable td{padding:9px 12px;border-bottom:1px solid var(--border);}
.ctable tr:last-child td{border-bottom:none;}
.ctable .cl{color:var(--muted);font-size:0.76rem;}.ctable .cn{color:var(--no-red);font-weight:700;font-family:var(--mono);}.ctable .cs{color:var(--se-yellow);font-weight:700;font-family:var(--mono);}
.winner-tag{font-size:0.68rem;padding:2px 8px;border-radius:99px;font-weight:700;}
.news-card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:18px;margin-bottom:16px;}
.news-card h3{font-size:0.72rem;text-transform:uppercase;letter-spacing:0.08em;color:var(--muted);margin-bottom:12px;}
.news-item{padding:9px 0;border-bottom:1px solid var(--border);}.news-item:last-child{border-bottom:none;}
.news-hl{font-size:0.83rem;color:var(--text);margin-bottom:3px;line-height:1.4;}.news-meta{font-size:0.68rem;color:var(--dim);}
.ntag{display:inline-block;padding:1px 6px;border-radius:3px;font-size:0.63rem;font-weight:700;margin-right:5px;}
.nt-bull{background:rgba(0,255,136,0.15);color:var(--green);}.nt-bear{background:rgba(255,51,85,0.15);color:var(--red);}.nt-neu{background:rgba(254,204,2,0.15);color:var(--se-yellow);}
.analyst-row{display:flex;gap:11px;flex-wrap:wrap;margin-bottom:16px;}
.analyst-card{flex:1;min-width:160px;background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:16px;text-align:center;}
.a-icon{font-size:1.8rem;margin-bottom:6px;}.a-rating{font-size:1rem;font-weight:900;}.a-name{font-size:0.68rem;color:var(--dim);margin-top:3px;}
@media(max-width:700px){.chart-grid{grid-template-columns:1fr}.chart-row3{grid-template-columns:1fr}.price-big{font-size:2rem}.kpi-row{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>
<div class="ticker-wrap"><div class="ticker" id="tickerEl"></div></div>
<header>
  <div class="logo">
    <h1 id="logoBtn">⚡ POLSAMLER</h1>
    <span>Sammenlign Vinmonopolet 🇳🇴 vs Systembolaget 🇸🇪 – finn billigste pris</span>
  </div>
  <div class="header-right">
    <span class="flag-badge badge-se">🇸🇪 Systembolaget</span>
    <span class="flag-badge badge-no">🇳🇴 Vinmonopolet</span>
    <span class="live-dot">● LIVE</span>
    <span class="clock" id="clockEl"></span>
  </div>
</header>
<div id="viewSearch">
  <div class="main">
    <div class="search-wrap">
      <div class="search-row">
        <div class="search-input-wrap">
          <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
          <input type="text" id="searchInput" placeholder="Søk etter produkt, f.eks. Mack, Barolo, Aperol…" autocomplete="off">
        </div>
        <button class="btn btn-yellow" id="searchBtn">🔍 SØK</button>
      </div>
      <div class="filter-row" id="filterRow">
        <button class="filter-btn active" data-cat="">Alle</button>
        <button class="filter-btn" data-cat="øl">🍺 Øl / Öl</button>
        <button class="filter-btn" data-cat="rødvin">🍷 Rødvin</button>
        <button class="filter-btn" data-cat="hvitvin">🥂 Hvitvin</button>
        <button class="filter-btn" data-cat="musserende">🍾 Musserende</button>
        <button class="filter-btn" data-cat="brennevin">🥃 Brennevin</button>
        <button class="filter-btn" data-cat="rosévin">🌸 Rosé</button>
      </div>
    </div>
    <div id="results">
      <div class="empty-state"><div class="big">🍺🇸🇪🇳🇴</div><p>Søk etter et produkt for å sammenligne priser</p></div>
    </div>
  </div>
</div>
<div id="viewProduct">
  <div class="prod-main">
    <button class="back-btn" id="backBtn">← Tilbake til søk</button>
    <div id="productContent"></div>
  </div>
</div>
<script>
const RATE=1.05;
const DEMO=[
  {id:'no-1',source:'no',name:'Hansa Pilsner',sub:'Øl · 4.7% · 500ml',category:'øl',price:29.9,vol:500,alc:4.7,country:'Norge'},
  {id:'se-1',source:'se',name:'Hansa Pilsner',sub:'Öl · 4.7% · 500ml',category:'øl',price:19.9,vol:500,alc:4.7,country:'Norge'},
  {id:'no-2',source:'no',name:'Mack Arctic Beer',sub:'Øl · 4.7% · 500ml',category:'øl',price:31.5,vol:500,alc:4.7,country:'Norge'},
  {id:'se-2',source:'se',name:'Mack Arctic Beer',sub:'Öl · 4.7% · 500ml',category:'øl',price:23.9,vol:500,alc:4.7,country:'Norge'},
  {id:'no-3',source:'no',name:'Aperol',sub:'Likør · 11% · 700ml · Italia',category:'brennevin',price:269.9,vol:700,alc:11,country:'Italia'},
  {id:'se-3',source:'se',name:'Aperol',sub:'Likör · 11% · 700ml · Italien',category:'brennevin',price:199.0,vol:700,alc:11,country:'Italia'},
  {id:'no-4',source:'no',name:'Barolo DOCG 2019',sub:'Rødvin · 14% · 750ml · Piemont',category:'rødvin',price:249.9,vol:750,alc:14,country:'Italia'},
  {id:'se-4',source:'se',name:'Barolo DOCG 2019',sub:'Rödvin · 14% · 750ml · Piemonte',category:'rødvin',price:229.0,vol:750,alc:14,country:'Italia'},
  {id:'no-5',source:'no',name:'Moët & Chandon Impérial',sub:'Champagne · 12% · 750ml',category:'musserende',price:459.9,vol:750,alc:12,country:'Frankrike'},
  {id:'se-5',source:'se',name:'Moët & Chandon Impérial',sub:'Champagne · 12% · 750ml',category:'musserende',price:399.0,vol:750,alc:12,country:'Frankrike'},
  {id:'no-6',source:'no',name:'Absolut Vodka',sub:'Vodka · 40% · 700ml',category:'brennevin',price:299.9,vol:700,alc:40,country:'Sverige'},
  {id:'se-6',source:'se',name:'Absolut Vodka',sub:'Vodka · 40% · 700ml',category:'brennevin',price:239.0,vol:700,alc:40,country:'Sverige'},
  {id:'no-7',source:'no',name:'Lindemans Bin 65',sub:'Hvitvin · 13.5% · 750ml',category:'hvitvin',price:129.9,vol:750,alc:13.5,country:'Australia'},
  {id:'se-7',source:'se',name:'Lindemans Bin 65',sub:'Vitt vin · 13.5% · 750ml',category:'hvitvin',price:99.0,vol:750,alc:13.5,country:'Australia'},
];
const SE_OL=[
  {sym:'PRIPPS',p:18.9,d:'+0.4%',up:true},{sym:'SPENDR',p:22.5,d:'-0.3%',up:false},
  {sym:'FALCON',p:19.9,d:'+1.1%',up:true},{sym:'CARLSB',p:21.0,d:'+0.2%',up:true},
  {sym:'STHML',p:35.9,d:'-0.8%',up:false},{sym:'OPPIG',p:39.9,d:'+2.3%',up:true},
  {sym:'OMNIBL',p:42.0,d:'-1.2%',up:false},{sym:'NYNSMN',p:29.9,d:'+0.7%',up:true},
  {sym:'SLTTRY',p:38.5,d:'+1.8%',up:true},{sym:'MARISTR',p:20.9,d:'-0.1%',up:false},
];
let appState={results:[],filtered:[],activeCategory:'',sortCol:'name',sortDir:'asc',isDemo:true};
let _blinkInterval=null;

function normName(n){return n.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9\s]/g,'').replace(/\s+/g,' ').trim();}
function canMatch(a,b){
  const wa=normName(a).split(' ').filter(w=>w.length>=2);
  const wb=normName(b).split(' ').filter(w=>w.length>=2);
  if(!wa.length||!wb.length)return false;
  if(wa[0]!==wb[0])return false;
  if(wa.length===1&&wb.length===1)return true;
  if(wa.length===1||wb.length===1)return false;
  return wa[1].slice(0,3)===wb[1].slice(0,3);
}

(function(){const all=[...SE_OL,...SE_OL];document.getElementById('tickerEl').innerHTML=all.map(t=>`<span class="tick-item"><span style="font-size:0.85rem">🇸🇪</span><span class="tick-name">${t.sym}</span><span class="tick-price">${t.p.toFixed(2)} SEK</span><span class="${t.up?'tick-up':'tick-dn'}">${t.d}</span></span>`).join('');})();

setInterval(()=>{document.getElementById('clockEl').textContent=new Date().toLocaleTimeString('no',{hour:'2-digit',minute:'2-digit',second:'2-digit'})+' Oslo';},1000);
document.getElementById('clockEl').textContent=new Date().toLocaleTimeString('no',{hour:'2-digit',minute:'2-digit',second:'2-digit'})+' Oslo';

function seededRand(s){s=s>>>0;return()=>{s=(Math.imul(1664525,s)+1013904223)>>>0;return s/0xffffffff;};}
function hashStr(str){let h=5381;for(let i=0;i<str.length;i++)h=((h<<5)+h)+str.charCodeAt(i)|0;return Math.abs(h);}
function genPriceHist(base,days,seed){const r=seededRand(seed);let p=base*(0.86+r()*0.08);const out=[];for(let i=0;i<days;i++){p+=(r()-0.48)*base*0.013;p=Math.max(base*0.72,Math.min(base*1.28,p));out.push(+p.toFixed(2));}out[out.length-1]=base;return out;}
function genVolHist(days,seed){const r=seededRand(seed+999);return Array.from({length:days},()=>Math.floor(r()*900+100));}
function genDates(days){return Array.from({length:days},(_,i)=>{const d=new Date();d.setDate(d.getDate()-(days-1-i));return d.toLocaleDateString('no',{day:'2-digit',month:'short'});});}
function saveObs(p){const key='obs_'+p.name.toLowerCase().replace(/\s+/g,'_');let obs=[];try{obs=JSON.parse(localStorage.getItem(key)||'[]');}catch(e){}const today=new Date().toISOString().split('T')[0];if(!obs.find(o=>o.date===today)){obs.push({date:today,price_no:p.price_no,price_se:p.price_se});if(obs.length>365)obs=obs.slice(-365);try{localStorage.setItem(key,JSON.stringify(obs));}catch(e){}}}

function showSearch(){document.getElementById('viewSearch').style.display='block';document.getElementById('viewProduct').style.display='none';['priceChart','volChart','alcChart','spreadChart'].forEach(id=>Chart.getChart(id)?.destroy());}
function showProduct(p){document.getElementById('viewSearch').style.display='none';document.getElementById('viewProduct').style.display='block';renderProduct(p);window.scrollTo(0,0);}
document.getElementById('backBtn').onclick=showSearch;
document.getElementById('logoBtn').onclick=showSearch;

async function doSearch(){
  const q=document.getElementById('searchInput').value.trim();if(!q)return;
  document.getElementById('results').innerHTML=`<div class="loading"><div class="spinner"></div><br>Henter priser…</div>`;
  try{
    const res=await fetch(`/api/search?q=${encodeURIComponent(q)}`);
    if(!res.ok)throw new Error('API-feil');
    const{no,se}=await res.json();
    appState.results=[...no,...se];
    appState.isDemo=appState.results.length===0;
    if(appState.isDemo){const lq=q.toLowerCase();appState.results=DEMO.filter(p=>p.name.toLowerCase().includes(lq)||p.category.includes(lq));}
  }catch(e){const lq=q.toLowerCase();appState.results=DEMO.filter(p=>p.name.toLowerCase().includes(lq)||p.category.includes(lq));appState.isDemo=true;}
  applyFilter();
}

function applyFilter(){
  let data=appState.results.filter(p=>!appState.activeCategory||p.category===appState.activeCategory);
  data.forEach(p=>{p.price_nok=p.source==='no'?p.price:p.price/RATE;p.price_sek=p.source==='se'?p.price:p.price*RATE;p.mlpkr=p.vol&&p.price>0?p.vol/p.price:0;});
  data.sort((a,b)=>{let av=a[appState.sortCol],bv=b[appState.sortCol];if(typeof av==='string'){av=av.toLowerCase();bv=bv.toLowerCase();}return appState.sortDir==='asc'?(av>bv?1:-1):(av<bv?1:-1);});
  appState.filtered=data;renderTable();
}

function renderTable(){
  const el=document.getElementById('results');const data=appState.filtered;
  if(!data.length){el.innerHTML=`<div class="empty-state"><div class="big">🔍</div><p>Ingen produkter funnet</p></div>`;return;}
  const noItems=data.filter(p=>p.source==='no'),seItems=data.filter(p=>p.source==='se');
  const rows=[];const usedSe=new Set();
  noItems.forEach(no=>{
    let bestSe=null,bestVol=0;
    seItems.forEach(se=>{if(usedSe.has(se.id))return;if(!canMatch(no.name,se.name))return;const vs=no.vol&&se.vol?1-Math.abs(no.vol-se.vol)/Math.max(no.vol,se.vol):0.5;if(vs>bestVol){bestVol=vs;bestSe=se;}});
    if(bestSe){usedSe.add(bestSe.id);rows.push({no,se:bestSe});}
  });
  if(!rows.length){el.innerHTML=`<div class="empty-state"><div class="big">🔍🇳🇴🇸🇪</div><p>Ingen produkter funnet i begge land</p></div>`;return;}
  const sa=c=>appState.sortCol===c?(appState.sortDir==='asc'?' ↑':' ↓'):'';
  el.innerHTML=`
    <div class="sort-bar">
      <div class="result-count">${appState.isDemo?'<span style="background:#2a1a00;color:#f59e0b;font-size:0.7rem;padding:2px 8px;border-radius:99px;font-weight:700;margin-right:8px">DEMO</span>':''}<strong>${rows.length}</strong> produkter · Kurs: 1 NOK = ${RATE} SEK</div>
      <div class="sort-options"><span class="sort-lbl">Sorter:</span>${['name','price_nok','price_sek','mlpkr'].map(c=>`<button class="sort-btn${appState.sortCol===c?' active':''}" data-sort="${c}">${{name:'Navn',price_nok:'NOK',price_sek:'SEK',mlpkr:'ml/kr'}[c]}${sa(c)}</button>`).join('')}</div>
    </div>
    <div class="table-wrap"><table>
      <thead><tr>
        <th data-sort="name" class="${appState.sortCol==='name'?'sorted':''}">Produkt${sa('name')}</th>
        <th>Kilde</th>
        <th data-sort="price_nok" class="${appState.sortCol==='price_nok'?'sorted':''}">🇳🇴 NOK${sa('price_nok')}</th>
        <th data-sort="price_sek" class="${appState.sortCol==='price_sek'?'sorted':''}">🇸🇪 SEK${sa('price_sek')}</th>
        <th>NOK→SEK</th><th>Differanse</th>
        <th data-sort="mlpkr" class="${appState.sortCol==='mlpkr'?'sorted':''}">ml/kr${sa('mlpkr')}</th>
        <th></th>
      </tr></thead>
      <tbody>${rows.map(({no,se})=>{
        const item=no||se;
        const nok2sek=no?(no.price_nok*RATE).toFixed(2):null;
        let diffHtml='<span class="diff-na">–</span>';
        if(no&&se){const d=no.price_nok*RATE-se.price_sek,pct=Math.abs(d/se.price_sek*100).toFixed(1);diffHtml=d>1?`<span class="diff-se">🇸🇪 ${pct}% billigere</span>`:d<-1?`<span class="diff-no">🇳🇴 ${pct}% billigere</span>`:`<span class="diff-na">≈ Likt</span>`;}
        const merged={name:item.name,sub:item.sub,category:item.category,vol:item.vol,alc:item.alc,country:item.country||'',price_no:no?no.price_nok:0,price_se:se?se.price_sek:0};
        const mid='p'+Math.random().toString(36).slice(2);window[mid]=merged;
        return `<tr onclick="showProduct(window['${mid}'])">
          <td><div class="product-name">${item.name}</div><div class="product-meta">${item.sub}</div></td>
          <td>${no?`<span class="source-badge badge-tbl-no">🇳🇴 VMP</span>`:''}${se?`<br><span class="source-badge badge-tbl-se">🇸🇪 SB</span>`:''}</td>
          <td>${no?`<span class="price-no">${no.price_nok.toFixed(2)}</span>`:'<span class="diff-na">–</span>'}</td>
          <td>${se?`<span class="price-se">${se.price_sek.toFixed(2)}</span>`:'<span class="diff-na">–</span>'}</td>
          <td>${nok2sek?`<span class="val-cell">${nok2sek} SEK</span>`:'–'}</td>
          <td>${diffHtml}</td>
          <td class="val-cell">${item.mlpkr?item.mlpkr.toFixed(2)+' ml/kr':'–'}</td>
          <td><span class="open-btn" onclick="event.stopPropagation();showProduct(window['${mid}'])">📈 Analyse</span></td>
        </tr>`;
      }).join('')}</tbody>
    </table></div>`;
  document.querySelectorAll('[data-sort]').forEach(b=>{b.onclick=e=>{e.stopPropagation();appState.sortCol===b.dataset.sort?(appState.sortDir=appState.sortDir==='asc'?'desc':'asc'):(appState.sortCol=b.dataset.sort,appState.sortDir='asc');applyFilter();};});
}

function renderProduct(p){
  if(_blinkInterval)clearInterval(_blinkInterval);
  saveObs(p);
  const seed=hashStr(p.name),DAYS=90;
  const hist_no=genPriceHist(p.price_no||200,DAYS,seed);
  const hist_se=genPriceHist(p.price_se||180,DAYS,seed+1);
  const vols=genVolHist(DAYS,seed),dates=genDates(DAYS);
  const r=seededRand(seed);
  const last=hist_no[DAYS-1],prev=hist_no[DAYS-2]||last;
  const dayChg=((last-prev)/prev*100).toFixed(2);
  const weekChg=((last-hist_no[Math.max(0,DAYS-8)])/hist_no[Math.max(0,DAYS-8)]*100).toFixed(2);
  const mthChg=((last-hist_no[0])/hist_no[0]*100).toFixed(2);
  const hi52=Math.max(...hist_no).toFixed(2),lo52=Math.min(...hist_no).toFixed(2);
  const alcIdx=(p.alc*p.vol/100).toFixed(0);
  const mlpkr=p.price_no>0?(p.vol/p.price_no).toFixed(2):'–';
  const sent=Math.min(100,Math.max(0,Math.floor(50+parseFloat(mthChg)*3+r()*18)));
  const pe=(p.price_no/(p.alc*0.4+1)).toFixed(1);
  const mkt=(p.price_no*(800+Math.floor(r()*5000))).toLocaleString('no');
  const isUp=parseFloat(dayChg)>=0;
  const diffSek=p.price_no*RATE-p.price_se;
  const diffPct=p.price_se>0?Math.abs(diffSek/p.price_se*100).toFixed(1):'–';
  const sym=p.name.replace(/\s+/g,'').toUpperCase().slice(0,5);
  const newsT=[
    {tag:'bull',txt:`Analytiker: "${p.name} handles med rabatt – oppside på 12% neste kvartal"`},
    {tag:'neu',txt:`Prisgap mellom Norge og Sverige stuper – ${p.name} i fokus`},
    {tag:'bull',txt:`${p.name} slår alkohol-indeksen for tredje måned på rad`},
    {tag:'bear',txt:`Importørstreik i ${p.country||'opprinnelseslandet'} kan presse lagrene ned`},
    {tag:'neu',txt:`Systembolaget og Vinmonopolet i samtaler – ${p.name} nevnt i lekkasje`},
    {tag:'bull',txt:`Sterk helgeetterspørsel driver ${p.name}-volumet opp 7% week-on-week`},
  ];
  const news=[...newsT].sort(()=>r()-0.5).slice(0,4);
  const analysts=sent>60
    ?[{i:'🧑‍💼',r:'STERK KJØP',n:'J.P. Morgen Alkohol',c:'var(--green)'},{i:'👩‍💼',r:'KJØP',n:'Goldman Sachs Drinks',c:'var(--green)'},{i:'🧑‍💻',r:'HOLD',n:'Nordea Spirits',c:'var(--se-yellow)'}]
    :sent<40
    ?[{i:'🧑‍💼',r:'SELG',n:'J.P. Morgen Alkohol',c:'var(--red)'},{i:'👩‍💼',r:'UNDERWEIGHT',n:'Goldman Sachs Drinks',c:'var(--red)'},{i:'🧑‍💻',r:'HOLD',n:'Nordea Spirits',c:'var(--se-yellow)'}]
    :[{i:'🧑‍💼',r:'KJØP',n:'J.P. Morgen Alkohol',c:'var(--green)'},{i:'👩‍💼',r:'HOLD',n:'Goldman Sachs Drinks',c:'var(--se-yellow)'},{i:'🧑‍💻',r:'KJØP',n:'Nordea Spirits',c:'var(--green)'}];

  document.getElementById('productContent').innerHTML=`
    <div class="product-header">
      <div class="product-title">
        <h2>${p.name}</h2>
        <div style="margin-top:7px"><span class="ticker-sym">${sym}:POLX</span><span class="cat-tag">${p.category.toUpperCase()} · ${p.sub}</span></div>
        <div style="margin-top:10px;font-size:0.76rem;color:var(--muted)">🏭 ${p.country||'Ukjent'} &nbsp;·&nbsp; 📦 ${p.vol}ml &nbsp;·&nbsp; 🍷 ${p.alc}% ABV</div>
      </div>
      <div style="text-align:right">
        <div style="font-size:0.68rem;color:var(--dim);margin-bottom:4px">SISTE PRIS (NOK)</div>
        <div class="price-big ${isUp?'up':'dn'}" id="livePriceEl">${p.price_no.toFixed(2)}</div>
        <div style="margin-top:6px"><span class="chg-badge ${isUp?'chg-up':'chg-dn'}">${isUp?'▲':'▼'} ${Math.abs(dayChg)}% i dag</span></div>
        <div style="font-size:0.72rem;color:var(--dim);margin-top:8px">Uke: <span style="color:${parseFloat(weekChg)>=0?'var(--green)':'var(--red)'}">${weekChg}%</span> &nbsp;·&nbsp; Måned: <span style="color:${parseFloat(mthChg)>=0?'var(--green)':'var(--red)'}">${mthChg}%</span></div>
      </div>
    </div>
    <div class="kpi-row">
      <div class="kpi-card"><div class="kpi-lbl">52-ukers høy</div><div class="kpi-val kv-g">${hi52} kr</div><div class="kpi-sub">NOK</div></div>
      <div class="kpi-card"><div class="kpi-lbl">52-ukers lav</div><div class="kpi-val kv-r">${lo52} kr</div><div class="kpi-sub">NOK</div></div>
      <div class="kpi-card"><div class="kpi-lbl">Alkohol-indeks™</div><div class="kpi-val kv-y">${alcIdx} cl</div><div class="kpi-sub">Ren alkohol per flaske</div></div>
      <div class="kpi-card"><div class="kpi-lbl">P/Promille-ratio</div><div class="kpi-val kv-b">${pe}x</div><div class="kpi-sub">Meget seriøs metrikk</div></div>
      <div class="kpi-card"><div class="kpi-lbl">ml / krone (NO)</div><div class="kpi-val kv-y">${mlpkr}</div><div class="kpi-sub">Verdiindikator</div></div>
      <div class="kpi-card"><div class="kpi-lbl">Fiktiv mkt.kap</div><div class="kpi-val kv-b">${mkt} kr</div><div class="kpi-sub">Helt oppdiktet</div></div>
      <div class="kpi-card"><div class="kpi-lbl">🇸🇪 SEK-pris</div><div class="kpi-val kv-y">${p.price_se.toFixed(2)} kr</div><div class="kpi-sub">Systembolaget</div></div>
      <div class="kpi-card"><div class="kpi-lbl">Prisforskjell</div><div class="kpi-val ${diffSek>0?'kv-g':'kv-r'}">${diffPct}%</div><div class="kpi-sub">${diffSek>0?'🇸🇪 billigst':'🇳🇴 billigst'}</div></div>
    </div>
    <div class="chart-grid">
      <div class="chart-card"><h3>PRISHISTORIKK – 90 DAGER <em>NOK 🇳🇴 vs SEK omregnet 🇸🇪</em></h3><div style="height:220px"><canvas id="priceChart"></canvas></div></div>
      <div class="chart-card"><h3>MARKEDSSENTIMENT <em>Alkohol-bull/bear-indeks™</em></h3>
        <div class="gauge-wrap" style="padding-top:14px">
          <div style="width:100%">
            <div style="display:flex;justify-content:space-between;font-size:0.65rem;color:var(--dim);margin-bottom:3px"><span>SELG</span><span>HOLD</span><span>KJØP</span></div>
            <div class="sentiment-bar"><div class="sent-needle" id="sentNeedle" style="left:50%"></div></div>
            <div style="display:flex;justify-content:space-between;font-size:0.62rem;color:var(--dim)"><span>0</span><span>50</span><span>100</span></div>
          </div>
          <div class="gauge-score" style="color:${sent>60?'var(--green)':sent<40?'var(--red)':'var(--se-yellow)'}">${sent}/100</div>
          <div class="gauge-lbl">${sent>65?'BULLISH 🚀':sent<35?'BEARISH 🐻':'NØYTRALT 😐'}</div>
          <div style="margin-top:14px;font-size:0.72rem;color:var(--dim);text-align:center;line-height:1.6">Basert på prisbevegelse,<br>alkoholinnhold og månefase™</div>
        </div>
      </div>
    </div>
    <div class="chart-row3">
      <div class="chart-card"><h3>HANDELSVOLUM <em>Stipulert av vår AI</em></h3><div style="height:160px"><canvas id="volChart"></canvas></div></div>
      <div class="chart-card"><h3>ALKOHOL-INDEKS™ <em>cl/krone over tid</em></h3><div style="height:160px"><canvas id="alcChart"></canvas></div></div>
      <div class="chart-card"><h3>NOK/SEK SPREAD <em>Hvem er billigst?</em></h3><div style="height:160px"><canvas id="spreadChart"></canvas></div></div>
    </div>
    <div class="compare-card"><h3>BILATERAL PRISANALYSE</h3>
      <table class="ctable">
        <tr><td class="cl">Pris</td><td class="cn">🇳🇴 ${p.price_no.toFixed(2)} NOK</td><td class="cs">🇸🇪 ${p.price_se.toFixed(2)} SEK</td><td>${diffSek>0?'<span class="winner-tag" style="background:rgba(0,106,167,0.3);color:var(--se-yellow)">🇸🇪 BILLIGST</span>':'<span class="winner-tag" style="background:rgba(239,43,45,0.2);color:var(--no-red)">🇳🇴 BILLIGST</span>'}</td></tr>
        <tr><td class="cl">NOK→SEK</td><td class="cn">${(p.price_no*RATE).toFixed(2)} SEK</td><td class="cs">${p.price_se.toFixed(2)} SEK</td><td style="font-size:0.8rem;color:${diffSek>0?'var(--green)':'var(--no-red)'}">${Math.abs(diffSek).toFixed(2)} SEK diff</td></tr>
        <tr><td class="cl">Per 100ml</td><td class="cn">${p.price_no>0?(p.price_no/p.vol*100).toFixed(2)+' kr':'–'}</td><td class="cs">${p.price_se>0?(p.price_se/p.vol*100).toFixed(2)+' kr':'–'}</td><td></td></tr>
        <tr><td class="cl">Alkohol/krone</td><td class="cn">${p.price_no>0?(p.alc*p.vol/100/p.price_no).toFixed(3)+' cl/kr':'–'}</td><td class="cs">${p.price_se>0?(p.alc*p.vol/100/p.price_se).toFixed(3)+' cl/kr':'–'}</td><td></td></tr>
        <tr><td class="cl">Konklusjon</td><td colspan="3" style="color:var(--se-yellow);font-weight:700">${diffSek>0?`Du sparer ${diffSek.toFixed(2)} SEK (${diffPct}%) per flaske ved kjøp i Sverige`:'Norge er faktisk billigst her!'}</td></tr>
      </table>
    </div>
    <div class="analyst-row">
      ${analysts.map(a=>`<div class="analyst-card"><div class="a-icon">${a.i}</div><div class="a-rating" style="color:${a.c}">${a.r}</div><div class="a-name">${a.n}</div></div>`).join('')}
      <div class="analyst-card"><div class="a-icon">🤖</div><div class="a-rating" style="color:var(--se-yellow)">AI-MODELL</div><div class="a-name" style="font-size:0.68rem;color:var(--dim);margin-top:5px;line-height:1.5">"Basert på alkohol-momentum og smaksprofil-synergier ser vi ${sent>50?'oppsidepotensial inn mot helgen':'risiko for korreksjon etter helgen'}"</div></div>
    </div>
    <div class="news-card"><h3>📰 SISTE NYHETER – ${p.name.toUpperCase()}</h3>
      ${news.map((n,i)=>`<div class="news-item"><div class="news-hl"><span class="ntag nt-${n.tag}">${n.tag==='bull'?'BULLISH':n.tag==='bear'?'BEARISH':'NØYTRALT'}</span>${n.txt}</div><div class="news-meta">${['Reuters Alkohol','Bloomberg Drinks','Financial Times Spirits','Dagens Næringsdrikk'][i]} · ${i+1}t siden</div></div>`).join('')}
    </div>`;

  setTimeout(()=>{const n=document.getElementById('sentNeedle');if(n){n.style.left='50%';setTimeout(()=>{n.style.left=sent+'%';},100);}},50);
  const base={responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{ticks:{color:'#5050aa',font:{size:9},maxTicksLimit:8},grid:{color:'#1a1a3a'}},y:{ticks:{color:'#5050aa',font:{size:9}},grid:{color:'#1a1a3a'}}}};
  new Chart(document.getElementById('priceChart'),{type:'line',data:{labels:dates,datasets:[{label:'🇳🇴 NOK',data:hist_no,borderColor:'#ef2b2d',backgroundColor:'rgba(239,43,45,0.07)',borderWidth:2,pointRadius:0,fill:true,tension:0.35},{label:'🇸🇪 SEK→NOK',data:hist_se.map(v=>+(v/RATE).toFixed(2)),borderColor:'#FECC02',backgroundColor:'rgba(254,204,2,0.05)',borderWidth:2,pointRadius:0,fill:true,tension:0.35}]},options:{...base,plugins:{legend:{display:true,labels:{color:'#9090cc',font:{size:10}}}}}});
  new Chart(document.getElementById('volChart'),{type:'bar',data:{labels:dates.filter((_,i)=>i%7===0),datasets:[{data:vols.filter((_,i)=>i%7===0),backgroundColor:vols.filter((_,i)=>i%7===0).map(v=>v>500?'rgba(0,255,136,0.55)':'rgba(0,106,167,0.55)'),borderRadius:4}]},options:base});
  const alcRoi=hist_no.map(v=>+(p.alc*p.vol/100/v*100).toFixed(3));
  new Chart(document.getElementById('alcChart'),{type:'line',data:{labels:dates,datasets:[{data:alcRoi,borderColor:'#a78bfa',backgroundColor:'rgba(167,139,250,0.1)',borderWidth:2,pointRadius:0,fill:true,tension:0.4}]},options:base});
  const spread=hist_no.map((v,i)=>+(v-hist_se[i]/RATE).toFixed(2));
  new Chart(document.getElementById('spreadChart'),{type:'line',data:{labels:dates,datasets:[{data:spread,segment:{borderColor:ctx=>spread[ctx.p1DataIndex]>0?'#ef2b2d':'#FECC02'},backgroundColor:'rgba(0,106,167,0.08)',borderWidth:2,pointRadius:0,fill:true,tension:0.3}]},options:base});
  _blinkInterval=setInterval(()=>{const el=document.getElementById('livePriceEl');if(!el)return;const j=(Math.random()-0.5)*0.08;el.textContent=(p.price_no+j).toFixed(2);el.classList.remove('blink-g','blink-r');void el.offsetWidth;el.classList.add(j>=0?'blink-g':'blink-r');},2800);
}

document.getElementById('searchBtn').onclick=doSearch;
document.getElementById('searchInput').addEventListener('keydown',e=>e.key==='Enter'&&doSearch());
document.getElementById('filterRow').addEventListener('click',e=>{const b=e.target.closest('.filter-btn');if(!b)return;document.querySelectorAll('.filter-btn').forEach(x=>x.classList.remove('active'));b.classList.add('active');appState.activeCategory=b.dataset.cat;applyFilter();});
appState.results=DEMO;appState.isDemo=true;applyFilter();
</script>
</body>
